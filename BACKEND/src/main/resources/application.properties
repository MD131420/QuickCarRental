# ============================================
# QuickCarRental — Application Configuration
# ============================================

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/quickcarrental?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate auto-executes import.sql after schema creation
spring.sql.init.mode=never

# Server
server.port=8080

# Admin password
app.admin.password=admin123
